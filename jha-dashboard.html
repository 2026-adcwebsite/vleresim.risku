<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHA Dashboard — Supervisor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#e2001a;--red-l:#fff0f0;--green:#1D9E75;--green-l:#f0faf5;--amber:#d97706;--amber-l:#fffbeb;--border:#e5e7eb;--text:#111;--muted:#6b7280;--bg:#f3f4f6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.tl{display:flex;align-items:center;gap:14px}
.logo{font-size:22px;font-weight:800;color:var(--red)}
.ttitle{font-size:15px;font-weight:600}
.tsub{font-size:12px;color:var(--muted)}
.tr{display:flex;gap:8px;align-items:center}
.ubox{font-size:13px;color:var(--muted);padding:0 10px}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
.btn-out{border:1px solid var(--border);background:#fff;color:var(--text)}
.btn-ref{border:1px solid var(--border);background:#fff;color:var(--text)}
.btn-exp{border:none;background:var(--red);color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:24px;max-width:1200px;margin:0 auto}
.sc{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--border)}
.slbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.sval{font-size:28px;font-weight:700;margin-top:6px}
.ssub{font-size:12px;color:var(--muted);margin-top:4px}
.sv-red{color:var(--red)}.sv-green{color:var(--green)}.sv-amber{color:var(--amber)}
.filters{padding:0 24px 16px;max-width:1200px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap}
.fi{padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:14px;background:#fff;outline:none}
.fi:focus{border-color:var(--red)}
.tw{padding:0 24px 24px;max-width:1200px;margin:0 auto}
.tc{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:#fafafa}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.bg{background:var(--green-l);color:var(--green)}.br{background:var(--red-l);color:var(--red)}.ba{background:var(--amber-l);color:var(--amber)}
.chip{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;background:var(--red-l);color:var(--red);margin:2px}
.bv{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:#fff;cursor:pointer}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:14px}
.loading{text-align:center;padding:48px;color:var(--muted)}
.spin{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:sp 0.8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.mh{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.mt{font-size:17px;font-weight:700}
.mc{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.mb{padding:24px}
.ds{margin-bottom:20px}
.dst{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.dr{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid #f5f5f5}
.dr:last-child{border-bottom:none}
.dk{color:var(--muted)}.dv{font-weight:500;text-align:right;max-width:60%}
.sig-img{border:1px solid var(--border);border-radius:8px;max-width:100%}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.pg img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px}
.cr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid #f9f9f9}
.cr:last-child{border-bottom:none}
.loading-scr{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:999}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}.tsub{display:none}th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){display:none}}
</style>
</head>
<body>
<div class="loading-scr" id="lscr"><div class="spin"></div><div style="font-size:14px;color:var(--muted)">Duke kontrolluar hyrjen...</div></div>

<div id="main" style="display:none">
<div class="topbar">
  <div class="tl"><div class="logo">ADC</div><div><div class="ttitle">JHA Dashboard</div><div class="tsub">Supervisor View</div></div></div>
  <div class="tr">
    <div class="ubox" id="ubox">—</div>
    <button class="btn btn-ref" onclick="loadData()">↻ Rifresko</button>
    <button class="btn btn-exp" onclick="exportCSV()">↓ CSV</button>
    <button class="btn btn-out" onclick="doLogout()">Dil</button>
  </div>
</div>

<div class="stats">
  <div class="sc"><div class="slbl">Totali Sot</div><div class="sval" id="st0">—</div><div class="ssub">forma sot</div></div>
  <div class="sc"><div class="slbl">Këtë Javë</div><div class="sval" id="st1">—</div><div class="ssub">forma javore</div></div>
  <div class="sc"><div class="slbl">Me Probleme</div><div class="sval sv-red" id="st2">—</div><div class="ssub">kontroll "Jo"</div></div>
  <div class="sc"><div class="slbl">Totali</div><div class="sval sv-green" id="st3">—</div><div class="ssub">të gjitha</div></div>
</div>

<div class="filters">
  <input class="fi" type="text" id="fe" placeholder="🔍 Kërko punonjës..." oninput="filterT()">
  <input class="fi" type="date" id="fd" oninput="filterT()">
  <select class="fi" id="fr" onchange="filterT()">
    <option value="">Të gjitha rreziqet</option>
    <option value="lartesia">Punë në Lartësi</option>
    <option value="elektrike">Rrezik Elektrik</option>
    <option value="renie_obj">Rënie Objektesh</option>
    <option value="zjar">Zjarr</option>
    <option value="hapesira">Hapësira të Kufizuara</option>
    <option value="trafiku">Trafik Rrugor</option>
  </select>
</div>

<div class="tw"><div class="tc">
  <table><thead><tr>
    <th>Punonjësi</th><th>Ticket</th><th>Lloji i Punës</th>
    <th>Rreziqet</th><th>Statusi</th><th>Data / Ora</th><th></th>
  </tr></thead>
  <tbody id="tbody"><tr><td colspan="7"><div class="loading"><div class="spin"></div><br>Duke ngarkuar...</div></td></tr></tbody>
  </table>
</div></div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="mh"><div class="mt" id="mtitle">Detajet</div><button class="mc" onclick="closeM()">×</button></div>
    <div class="mb" id="mbody"></div>
  </div>
</div>

<script>
const SURL='https://klvxppajwtwxxeomvefe.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsdnhwcGFqd3R3eHhlb212ZWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTM0NTgsImV4cCI6MjA5MzQ2OTQ1OH0.QApeuRya7HiOT494qljVIKTv7XX_HSeS61tAwijbOlk';
const {createClient}=supabase;
const sb=createClient(SURL,SKEY);

const RL={lartesia:'Lartësi',elektrike:'Elektrik',renie_obj:'Rënie',zjar:'Zjarr',pesash:'Pesash',trafiku:'Trafik',hapesira:'Hapësira',kimike:'Kimike'};
const CL={q1:'Min. 2 punonjës',q2:'Pajisje certifikuara',q3:'Personel trajnuar',q4:'PMI OK',q5:'Detektor gazi',q6:'Rrugë dalje',q7:'Procedurat emergjence',q8:'Shkallë siguruar',q9:'Distanca rrjeti'};

let allData=[];

sb.auth.getSession().then(async({data:{session}})=>{
  if(!session){window.location.href='login.html';return;}
  const {data:p}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  if(p?.role!=='supervisor'){window.location.href='jha-form.html';return;}
  document.getElementById('ubox').textContent=p?.full_name||session.user.email;
  document.getElementById('lscr').style.display='none';
  document.getElementById('main').style.display='block';
  loadData();
});

async function doLogout(){await sb.auth.signOut();window.location.href='login.html';}

async function loadData(){
  const {data:{session}}=await sb.auth.getSession();
  const res=await fetch(`${SURL}/rest/v1/jha_submissions?select=*&order=created_at.desc&limit=500`,{
    headers:{'apikey':SKEY,'Authorization':'Bearer '+session.access_token}
  });
  allData=await res.json();
  updateStats();renderT(allData);
}

function updateStats(){
  const now=new Date(),tod=now.toDateString(),wk=new Date(now-7*86400000);
  document.getElementById('st0').textContent=allData.filter(r=>new Date(r.created_at).toDateString()===tod).length;
  document.getElementById('st1').textContent=allData.filter(r=>new Date(r.created_at)>=wk).length;
  document.getElementById('st2').textContent=allData.filter(r=>Object.values(r.kontrollet||{}).includes('jo')).length;
  document.getElementById('st3').textContent=allData.length;
}

function getSt(r){
  const v=Object.values(r.kontrollet||{});
  if(v.includes('jo'))return{l:'Probleme',c:'br'};
  if(!v.length)return{l:'Pa kontrolle',c:'ba'};
  return{l:'OK',c:'bg'};
}

function fmtD(d){const dt=new Date(d);return dt.toLocaleDateString('sq-AL',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+dt.toLocaleTimeString('sq-AL',{hour:'2-digit',minute:'2-digit'});}

function renderT(data){
  const tb=document.getElementById('tbody');
  if(!data.length){tb.innerHTML='<tr><td colspan="7"><div class="empty">Nuk u gjetën forma.</div></td></tr>';return;}
  tb.innerHTML=data.map(r=>{
    const chips=(r.rreziqet||[]).map(k=>`<span class="chip">${RL[k]||k}</span>`).join('');
    const st=getSt(r);
    return `<tr>
      <td><strong>${r.emri||r.user_fullname||'—'}</strong><br><span style="font-size:12px;color:var(--muted)">${r.supervisor||''}</span></td>
      <td><span style="font-family:monospace;font-size:13px">${r.ticket||'—'}</span></td>
      <td style="font-size:13px">${r.lloji||'—'}</td>
      <td>${chips||'<span style="color:#ccc;font-size:13px">—</span>'}</td>
      <td><span class="badge ${st.c}">${st.l}</span></td>
      <td style="font-size:12px;color:var(--muted);white-space:nowrap">${fmtD(r.created_at)}</td>
      <td><button class="bv" onclick="showD('${r.id}')">Shiko</button></td>
    </tr>`;
  }).join('');
}

function filterT(){
  const e=document.getElementById('fe').value.toLowerCase();
  const d=document.getElementById('fd').value;
  const rk=document.getElementById('fr').value;
  renderT(allData.filter(r=>{
    if(e&&!(r.emri||r.user_fullname||'').toLowerCase().includes(e))return false;
    if(d&&!r.created_at.startsWith(d))return false;
    if(rk&&!(r.rreziqet||[]).includes(rk))return false;
    return true;
  }));
}

function showD(id){
  const r=allData.find(x=>x.id===id);if(!r)return;
  document.getElementById('mtitle').textContent=`${r.emri||'—'} — ${r.ticket||'—'}`;
  const c=r.kontrollet||{},st=getSt(r);
  const pmi=(r.pmi||[]).join(', ')||'—';
  const photos=(r.foto_urls||[]).filter(Boolean);
  document.getElementById('mbody').innerHTML=`
    <div class="ds"><div class="dst">Informacion i Përgjithshëm</div>
      <div class="dr"><span class="dk">Punonjësi</span><span class="dv">${r.emri||'—'}</span></div>
      <div class="dr"><span class="dk">Ticket</span><span class="dv" style="font-family:monospace">${r.ticket||'—'}</span></div>
      <div class="dr"><span class="dk">Adresa</span><span class="dv">${r.adresa||'—'}</span></div>
      <div class="dr"><span class="dk">Lloji</span><span class="dv">${r.lloji||'—'}</span></div>
      <div class="dr"><span class="dk">Supervisor</span><span class="dv">${r.supervisor||'—'}</span></div>
      <div class="dr"><span class="dk">Data</span><span class="dv">${fmtD(r.created_at)}</span></div>
      <div class="dr"><span class="dk">Statusi</span><span class="dv"><span class="badge ${st.c}">${st.l}</span></span></div>
    </div>
    <div class="ds"><div class="dst">Rreziqet</div>
      ${(r.rreziqet||[]).length?(r.rreziqet.map(k=>`<span class="chip" style="margin:3px">${RL[k]||k}</span>`).join('')):'<span style="color:var(--muted);font-size:13px">Asnjë i zgjedhur</span>'}
    </div>
    <div class="ds"><div class="dst">Kontrollet e Sigurisë</div>
      ${Object.keys(CL).map(k=>{const v=c[k];const col=v==='po'?'var(--green)':v==='jo'?'var(--red)':'var(--muted)';const lb=v==='po'?'✓ Po':v==='jo'?'✗ Jo':v==='na'?'N/A':'—';return`<div class="cr"><span>${CL[k]}</span><span style="font-weight:600;color:${col}">${lb}</span></div>`;}).join('')}
    </div>
    ${r.verejte?`<div class="ds"><div class="dst">Vërejtje</div><p style="font-size:14px;line-height:1.5">${r.verejte}</p></div>`:''}
    <div class="ds"><div class="dst">PMI të Veshura</div><p style="font-size:13px;line-height:1.6">${pmi}</p></div>
    ${photos.length?`<div class="ds"><div class="dst">Foto (${photos.length})</div><div class="pg">${photos.map(p=>`<img src="${p}" loading="lazy">`).join('')}</div></div>`:''}
    ${r.signature?`<div class="ds"><div class="dst">Nënshkrim</div><img src="${r.signature}" class="sig-img"></div>`:''}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeM(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeM();});

function exportCSV(){
  const rows=[['ID','Emri','Email','Ticket','Adresa','Lloji','Supervisor','Rreziqet','Statusi','Data']];
  allData.forEach(r=>{
    const st=getSt(r);
    rows.push([r.id,r.emri||r.user_fullname,r.user_email,r.ticket,r.adresa,r.lloji,r.supervisor,(r.rreziqet||[]).join(';'),st.l,fmtD(r.created_at)]);
  });
  const csv=rows.map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='JHA_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

setInterval(loadData,60000);
</script>
</body>
</html>
